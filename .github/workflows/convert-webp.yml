name: Convert PNG to WebP

on:
  push:
    paths:
      - 'assets/img/**/*.png'

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cwebp
        run: sudo apt-get install -y webp

      - name: Convert new/changed PNGs to WebP
        run: |
          # 直前のコミットで追加・変更されたPNGを取得
          git diff --name-only --diff-filter=ACM HEAD~1 HEAD -- '*.png' | while read file; do
            if [ -f "$file" ]; then
              webp_file="${file%.png}.webp"
              cwebp -q 85 "$file" -o "$webp_file"
              echo "Converted: $file -> $webp_file"
            fi
          done

      - name: Commit WebP files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/img/**/*.webp
          # 変換ファイルがある場合のみコミット
          if git diff --cached --quiet; then
            echo "No new WebP files to commit."
          else
            git commit -m "auto: PNGからWebPを自動生成"
            git push
          fi
